run:
  run_name: "block256_gatefast"
  seed: 12345
  out_dir: "results/block256_gatefast"
  threads: 1
  pin_cpu: 2
  disable_turbo: false
  disable_smt: false

problem:
  n: 256
  a_max: 96
  I_max: 200

structure:
  mode: "block_sparse"
  B: 16
  block_sizes: [16,16,16,16,16,16,16,16,16,16,16,16,16,16,16,16]
  m_local_per_block: 64
  m_global: 32

generator:
  A_local_type: "dense_in_block_normalized"
  A_global_type: "factor_plus_gross"
  factors: 8
  row_norm: "l2_unit"
  b_margin: 10.0
  b_noise_std: 0.2

solver:
  warm_start: true
  bland_rule: true
  feasibility: "certified"
  q_anchor: "zero"
  strict_interior: true
  kappa_min: 1.0e-6
  tau_abs_scale: 8.0
  tau_shrink_min: 0.0
  tau_shrink_max: 0.001
  fallback_enabled: true
  fallback_mode: "ray_scale_to_anchor"

stream:
  mode: "correlated_block_sparse"
  seed_stream: 424242
  T_warmup: 200
  T_latency: 2000
  T_feas: 4000
  ar_rho: 0.995
  K_small: 1
  K_small_alt: 2
  p_K_small_alt: 0.02
  delta_small: 0.20
  p_jump: 0.001
  K_jump: 4
  delta_jump: 2.0
  clamp_inf: 100.0
  burst:
    enabled: false
  q_small: 1.0
  q_big: 10.0
  p_big: 0.01

instrumentation:
  latency_clock: "rdtsc"
  perf:
    enabled: false
  energy:
    enabled: false
